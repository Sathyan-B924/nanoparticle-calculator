<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#050d1f"/>
    </radialGradient>
    <radialGradient id="nuc" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#b8f4ff"/>
      <stop offset="55%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#005f8a"/>
    </radialGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#00c8e8" stroke-width="1.1" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#00c8e8" stroke-width="1.1" opacity="0.8" transform="rotate(60 16 16)" filter="url(#glow)"/>
  <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#00c8e8" stroke-width="1.1" opacity="0.8" transform="rotate(120 16 16)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="3.5" fill="url(#nuc)" filter="url(#glow)"/>
</svg>
